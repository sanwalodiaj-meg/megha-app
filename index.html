<!DOCTYPE html>
<html>
<head>
  <title>Megha & Baby ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: linear-gradient(to bottom, #fff0f5, #ffe4ec);
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: #e91e63;
      font-size: 28px;
    }

    .top-message {
      font-size: 18px;
      color: #555;
      margin-bottom: 10px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin: 15px 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .pregnancy-text {
      font-size: 24px;
      font-weight: bold;
      color: #e91e63;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      background: #e91e63;
      width: 0%;
      transition: width 1s ease;
    }

    .baby-emoji {
      font-size: 60px;
      margin-bottom: 10px;
    }

    input[type="file"] {
      margin: 10px 0;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #e91e63;
      color: white;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
    }

    label {
      display: block;
      padding: 10px;
      border-radius: 10px;
      margin: 5px 0;
      background: #fafafa;
    }
  </style>
</head>

<body>

<h1>Megha & Baby ❤️</h1>
<p id="message" class="top-message"></p>

<div class="container">

  <!-- Pregnancy -->
  <div class="card">
    <h2>Our Baby Journey 👶</h2>
    <p id="pregnancy" class="pregnancy-text"></p>

    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
  </div>

  <!-- Baby Growth -->
  <div class="card">
    <h2>Baby Growth 🌱</h2>
    <div id="babyEmoji" class="baby-emoji"></div>
    <p id="babySize"></p>
    <p id="babyInfo"></p>
    <p id="trimester"></p>
  </div>

  <!-- Checklist -->
  <div class="card" id="checklistCard">
    <h2>Daily Care 🧘‍♀️</h2>
  </div>

  <!-- Upload -->
  <div class="card">
    <h2>Upload Reports 📄</h2>

    <input type="file" id="fileInput"><br>
    <button onclick="uploadFile()">Upload</button>

    <p id="uploadStatus" class="status"></p>
  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwngFia5JL6YIBZe60eY-5ZSJWZQqL_m5NL_Lx5rGbQi2VWQaBl4RXr6rM-eF7guiSLLQ/exec";

// Pregnancy
const lmp = new Date("2026-03-21");
const today = new Date();
const days = Math.floor((today - lmp) / (1000*60*60*24));
const weeks = Math.floor(days/7);
const remDays = days % 7;

document.getElementById("pregnancy").innerText =
  weeks + " weeks " + remDays + " days ❤️";

// Progress
const progress = (weeks / 40) * 100;
document.getElementById("progressFill").style.width = progress + "%";

// Message
fetch(API_URL + "?sheet=Messages")
.then(res=>res.json())
.then(data=>{
  document.getElementById("message").innerText =
    data[days % data.length].Message;
});

// Baby Growth Data
const growth = {
  4:{emoji:"🌱", size:"Poppy Seed", info:"Baby just beginning", trimester:"1st Trimester 💫"},
  5:{emoji:"🌾", size:"Sesame Seed", info:"Heart forming", trimester:"1st Trimester 💫"},
  6:{emoji:"🫘", size:"Lentil", info:"Heartbeat may start", trimester:"1st Trimester 💫"},
  7:{emoji:"🫐", size:"Blueberry", info:"Brain developing", trimester:"1st Trimester 💫"},
  8:{emoji:"🫘", size:"Kidney Bean", info:"Baby moving", trimester:"1st Trimester 💫"},
  9:{emoji:"🍇", size:"Grape", info:"Stronger heartbeat", trimester:"1st Trimester 💫"},
  10:{emoji:"🍓", size:"Strawberry", info:"Fingers forming", trimester:"1st Trimester 💫"},
  11:{emoji:"🍈", size:"Fig", info:"Bones forming", trimester:"1st Trimester 💫"},
  12:{emoji:"🍋", size:"Lime", info:"Fully formed basics", trimester:"1st Trimester 💫"}
};

if(growth[weeks]){
  document.getElementById("babyEmoji").innerText = growth[weeks].emoji;
  document.getElementById("babySize").innerText = "Size: " + growth[weeks].size;
  document.getElementById("babyInfo").innerText = growth[weeks].info;
  document.getElementById("trimester").innerText = growth[weeks].trimester;
}

// Checklist
fetch(API_URL + "?sheet=Checklist")
.then(res=>res.json())
.then(data=>{
  const c = document.getElementById("checklistCard");

  data.forEach((item,i)=>{
    const checked = localStorage.getItem("c_"+i)==="true";

    const el = document.createElement("label");
    el.innerHTML = `<input type="checkbox" ${checked?"checked":""}> ${item.Task}`;

    el.querySelector("input").onchange = e=>{
      localStorage.setItem("c_"+i,e.target.checked);
    };

    c.appendChild(el);
  });
});

// Upload
function uploadFile() {
  const fileInput = document.getElementById("fileInput");
  const file = fileInput.files[0];
  const status = document.getElementById("uploadStatus");

  if (!file) {
    alert("Please select a file");
    return;
  }

  status.innerText = "Uploading... ⏳";

  const reader = new FileReader();

  reader.onload = function () {
    const base64 = reader.result.split(',')[1];

    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({
        file: base64,
        filename: file.name
      })
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        status.innerText = "Successfully Uploaded ❤️";
        fileInput.value = "";
      } else {
        status.innerText = "Upload failed ❌";
      }
    })
    .catch((err) => {
      status.innerText = "Error uploading ❌";
      console.error(err);
    });
  };

  reader.readAsDataURL(file);
}

</script>

</body>
</html>
