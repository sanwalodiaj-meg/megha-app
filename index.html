<!DOCTYPE html>
<html>
<head>
  <title>Megha & Baby ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: #fff0f5;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: #e91e63;
      font-size: 28px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin: 15px 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    h2 {
      margin-bottom: 10px;
      color: #333;
    }

    .pregnancy-text {
      font-size: 24px;
      font-weight: bold;
      color: #e91e63;
    }

    label {
      display: block;
      padding: 10px;
      border-radius: 10px;
      margin: 5px 0;
      background: #fafafa;
      font-size: 16px;
    }

    input[type="checkbox"] {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .message {
      font-size: 18px;
      color: #555;
      font-style: italic;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>

<h1>Megha & Baby ❤️</h1>

<div class="container">

  <div class="card">
    <h2>Our Baby Journey 👶</h2>
    <p id="pregnancy" class="pregnancy-text"></p>
  </div>

  <div class="card" id="checklistCard">
    <h2>Daily Care 🧘‍♀️</h2>
  </div>

  <div class="card">
    <h2>From Jay 💌</h2>
    <p id="message" class="message"></p>
  </div>

</div>

<div class="footer">
  Made with ❤️ by Jay
</div>

<script>

// 🔗 YOUR GOOGLE APPS SCRIPT API
const API_URL = "https://script.google.com/macros/s/AKfycbwngFia5JL6YIBZe60eY-5ZSJWZQqL_m5NL_Lx5rGbQi2VWQaBl4RXr6rM-eF7guiSLLQ/exec";


// ❤️ Pregnancy Calculator
const lmp = new Date("2026-03-21");
const today = new Date();

const diffTime = today - lmp;
const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

const weeks = Math.floor(days / 7);
const remDays = days % 7;

document.getElementById("pregnancy").innerText =
  weeks + " weeks " + remDays + " days ❤️";


// 💌 Load Messages from Google Sheets
fetch(API_URL + "?sheet=Messages")
  .then(res => res.json())
  .then(data => {
    const msgIndex = days % data.length;
    document.getElementById("message").innerText =
      data[msgIndex].Message;
  })
  .catch(err => {
    document.getElementById("message").innerText =
      "Unable to load message 💔";
  });


// 📋 Load Checklist from Google Sheets
fetch(API_URL + "?sheet=Checklist")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("checklistCard");

    data.forEach((item, index) => {
      const checked = localStorage.getItem("check_" + index) === "true";

      const el = document.createElement("label");
      el.innerHTML = `
        <input type="checkbox" ${checked ? "checked" : ""}>
        ${item.Task} (${item.Time})
      `;

      el.querySelector("input").addEventListener("change", (e) => {
        localStorage.setItem("check_" + index, e.target.checked);
      });

      container.appendChild(el);
    });
  })
  .catch(err => {
    document.getElementById("checklistCard").innerHTML +=
      "<p>Failed to load checklist</p>";
  });

</script>

</body>
</html>
